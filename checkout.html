<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Träffa Coffee & Eatery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Plus Jakarta Sans',sans-serif; background-color:#f3f4f6; }
        .dashed-line { border-top: 2px dashed #e5e7eb; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.25s ease-out forwards; }
    </style>
</head>
<body class="antialiased text-gray-800">
<main class="w-full max-w-[480px] mx-auto bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-x-hidden">

    <header class="sticky top-0 z-20 bg-white shadow-sm pt-5 pb-4 px-4 flex items-center gap-3">
        <button onclick="window.location.href='pesanan.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
            <i class="ph-bold ph-arrow-left text-lg"></i>
        </button>
        <h1 class="text-xl font-bold text-gray-900">Checkout</h1>
    </header>

    <div class="flex-1 px-4 py-5 space-y-4 pb-32 fade-in">

        <!-- Info Meja & Pemesan -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex items-start justify-between mb-3">
                <div>
                    <p class="text-xs text-gray-500 mb-0.5">Nomor Meja</p>
                    <div class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg inline-flex items-center gap-1.5 border border-blue-200">
                        <i class="ph-fill ph-armchair"></i>
                        <span class="font-bold text-sm">A01</span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 mb-0.5">Pemesan</p>
                    <p class="font-semibold text-gray-900 text-sm" id="display-name">-</p>
                </div>
            </div>
            <div class="dashed-line my-3"></div>
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-500 mb-1">Metode Bayar</p>
                    <span class="text-sm font-bold text-blue-600" id="display-payment">-</span>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 mb-1">Catatan Dapur</p>
                    <p class="text-sm text-gray-700 italic" id="display-notes">-</p>
                </div>
            </div>
        </div>

        <!-- QR Pembayaran — hanya tampil jika QRIS -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex-col items-center justify-center text-center">
            <h2 class="text-sm font-bold text-gray-900 mb-1">QR Pembayaran</h2>
            <p class="text-xs text-gray-500 mb-4">Tunjukkan QR ini ke kasir untuk membayar pesanan Anda</p>
            <div class="mx-auto p-2 bg-white border-2 border-gray-200 rounded-xl shadow-inner w-40 h-40 flex items-center justify-center">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TrffaCoffee-A01&color=111827" alt="QR Pembayaran" class="w-full h-full object-contain">
            </div>
        </div>

        <!-- Ringkasan Pembayaran -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold text-gray-900 mb-3">Ringkasan Pembayaran</h2>
            <div class="space-y-2 mb-3">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Subtotal</span>
                    <span class="font-medium text-gray-800" id="calc-subtotal">Rp 0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">Pajak (12%)</span>
                    <span class="font-medium text-gray-800" id="calc-tax">Rp 0</span>
                </div>
            </div>
            <div class="dashed-line my-3"></div>
            <div class="flex justify-between items-center">
                <span class="font-bold text-gray-800">Total Tagihan</span>
                <span class="font-black text-blue-600 text-xl" id="calc-total">Rp 0</span>
            </div>
        </div>

        <!-- Rincian Pesanan -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold text-gray-900 mb-4 flex items-center gap-2">
                <i class="ph-fill ph-shopping-bag text-blue-500 text-lg"></i> Rincian Pesanan
            </h2>
            <div id="order-list" class="space-y-3"></div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full max-w-[480px] left-1/2 -translate-x-1/2 p-4 bg-white border-t border-gray-200 z-30">
        <button onclick="completeOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white rounded-xl py-3.5 font-bold text-base shadow-lg transition-transform active:scale-[0.98] flex items-center justify-center gap-2">
            <i class="ph-bold ph-check-circle text-xl"></i>
            <span>Selesaikan Pesanan</span>
        </button>
    </div>

</main>
<script src="menu-data.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const cart  = getCart();
        const buyer = JSON.parse(localStorage.getItem('resto_buyer_data')) || {};
        if (!cart.length) { window.location.href = 'index.html'; return; }

        document.getElementById('display-name').innerText    = buyer.name    || 'Pelanggan';
        document.getElementById('display-payment').innerText = buyer.payment || 'Qris';
        document.getElementById('display-notes').innerText   = buyer.notes   ? `"${buyer.notes}"` : '-';


        const orderList = document.getElementById('order-list');
        let subtotal = 0;
        cart.forEach(ci => {
            const menu = MENU_DATA.find(m => m.id === ci.id);
            if (!menu) return;
            const sub = menu.price * ci.qty;
            subtotal += sub;
            const div = document.createElement('div');
            div.className = 'flex justify-between items-start';
            div.innerHTML = `
                <div class="flex-1">
                    <p class="font-semibold text-gray-800 text-sm">${menu.name}</p>
                    <p class="text-xs text-gray-500">${ci.qty}x @ ${formatRupiah(menu.price)}</p>
                </div>
                <div class="font-medium text-gray-900 text-sm">${formatRupiah(sub)}</div>`;
            orderList.appendChild(div);
        });

        const tax   = subtotal * 0.12;
        const grand = subtotal + tax;
        document.getElementById('calc-subtotal').innerText = formatRupiah(subtotal);
        document.getElementById('calc-tax').innerText      = formatRupiah(tax);
        document.getElementById('calc-total').innerText    = formatRupiah(grand);
    });

    function completeOrder() {
        const buyer = JSON.parse(localStorage.getItem('resto_buyer_data')) || {};
        const cart  = getCart();

        // Simpan data sukses untuk success.html
        const subtotal = cart.reduce((s,ci)=>{ const m=MENU_DATA.find(x=>x.id===ci.id); return s+(m?m.price*ci.qty:0); },0);
        const tax      = subtotal * 0.12;
        const successData = {
            invoice:  generateInvoice(),
            name:     buyer.name    || 'Pelanggan',
            payment:  buyer.payment || '-',
            notes:    buyer.notes   || '',
            items:    cart,
            subtotal: subtotal,
            tax:      tax,
            total:    subtotal + tax
        };
        localStorage.setItem('resto_success_data', JSON.stringify(successData));

        // Bersihkan cart & buyer data
        localStorage.removeItem('resto_cart');
        localStorage.removeItem('resto_buyer_data');

        window.location.href = 'success.html';
    }
</script>
</body>
</html>
