<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Träffa Coffee & Eatery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Plus Jakarta Sans',sans-serif; background-color:#e5e7eb; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased text-gray-800">
<main class="w-full max-w-[480px] mx-auto bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-x-hidden">

    <header class="sticky top-0 z-20 bg-white border-b border-gray-100 px-4 py-4 flex items-center justify-between">
        <button onclick="window.location.href='index.html'" class="text-gray-600 hover:text-sky-500 transition-colors p-1 -ml-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
            </svg>
        </button>
        <h1 class="text-base font-bold text-gray-900 absolute left-1/2 -translate-x-1/2">Pengaturan</h1>
        <div class="w-6"></div>
    </header>

    <!-- App branding -->
    <div class="fade-in bg-gradient-to-br from-sky-500 to-sky-600 mx-4 mt-6 rounded-2xl p-5 text-white shadow-lg shadow-sky-200">
        <p class="text-xs font-bold uppercase tracking-widest opacity-75 mb-1">Sedang Makan di</p>
        <h2 class="text-xl font-black">Träffa Coffee & Eatery</h2>
        <div class="flex items-center gap-2 mt-3">
            <div class="bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-lg flex items-center gap-1.5 border border-white/30">
                <span class="text-xs font-bold opacity-80">Meja</span>
                <span class="font-black text-lg">A01</span>
            </div>
            <span class="text-xs opacity-70">• Semarang, Jawa Tengah</span>
        </div>
    </div>

    <div class="px-4 pt-5 space-y-3 pb-8 fade-in">

        <!-- Language -->
        <button onclick="openLanguageModal()" class="w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex items-center justify-between hover:border-sky-200 group transition-all">
            <div class="flex items-center gap-4 text-gray-700 group-hover:text-sky-500 transition-colors">
                <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-sky-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418"/>
                    </svg>
                </div>
                <span class="font-semibold text-sm">Bahasa / Language</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="current-language" class="text-xs font-semibold text-gray-400">Indonesia</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-gray-400 group-hover:text-sky-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
                </svg>
            </div>
        </button>

        <!-- Kebijakan Privasi -->
        <button onclick="showPrivacy()" class="w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex items-center justify-between hover:border-sky-200 group transition-all">
            <div class="flex items-center gap-4 text-gray-700 group-hover:text-sky-500 transition-colors">
                <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-sky-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                    </svg>
                </div>
                <span class="font-semibold text-sm">Kebijakan Privasi</span>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-gray-400 group-hover:text-sky-500">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
            </svg>
        </button>

        <!-- Hapus Keranjang -->
        <button onclick="clearCart()" class="w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex items-center justify-between hover:border-red-200 group transition-all">
            <div class="flex items-center gap-4 text-gray-700 group-hover:text-red-500 transition-colors">
                <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-red-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                    </svg>
                </div>
                <span class="font-semibold text-sm">Kosongkan Keranjang</span>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-gray-400 group-hover:text-red-500">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
            </svg>
        </button>

    </div>

    <footer class="mt-auto py-8 flex flex-col items-center justify-center gap-1">
        <p class="text-[11px] font-semibold text-gray-400 uppercase tracking-widest">Träffa Coffee & Eatery</p>
        <p class="text-[10px] text-gray-300">v1.0.0 • Powered by ESB</p>
    </footer>

    <!-- Language Modal -->
    <div id="language-modal" class="fixed inset-0 bg-black/40 z-50 flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
        <div id="language-sheet" class="bg-white w-full max-w-[480px] rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300 flex flex-col gap-3">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-gray-900 text-lg">Pilih Bahasa</h3>
                <button onclick="closeLanguageModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <button onclick="selectLanguage('Indonesia')" class="w-full p-4 rounded-xl border border-gray-100 hover:border-sky-500 hover:bg-sky-50 hover:text-sky-600 flex items-center justify-between group transition-all text-left">
                <div class="flex items-center gap-3"><span class="text-xl">🇮🇩</span><span class="font-semibold text-gray-800 group-hover:text-sky-600">Indonesia</span></div>
            </button>
            <button onclick="selectLanguage('English')" class="w-full p-4 rounded-xl border border-gray-100 hover:border-sky-500 hover:bg-sky-50 hover:text-sky-600 flex items-center justify-between group transition-all text-left">
                <div class="flex items-center gap-3"><span class="text-xl">🇬🇧</span><span class="font-semibold text-gray-800 group-hover:text-sky-600">English</span></div>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg z-50 hidden flex items-center gap-2">
        <span id="toast-msg">✓ Berhasil</span>
    </div>

</main>
<script src="menu-data.js"></script>
<script>
    function openLanguageModal() {
        const modal = document.getElementById('language-modal');
        const sheet = document.getElementById('language-sheet');
        modal.classList.remove('hidden');
        setTimeout(() => { modal.classList.remove('opacity-0'); sheet.classList.remove('translate-y-full'); }, 10);
    }
    function closeLanguageModal() {
        const modal = document.getElementById('language-modal');
        const sheet = document.getElementById('language-sheet');
        modal.classList.add('opacity-0'); sheet.classList.add('translate-y-full');
        setTimeout(() => modal.classList.add('hidden'), 300);
    }
    function selectLanguage(lang) {
        document.getElementById('current-language').innerText = lang;
        closeLanguageModal();
        showToast(`Bahasa diubah ke ${lang}`);
    }
    function showPrivacy() {
        showToast('Halaman Kebijakan Privasi akan segera hadir');
    }
    function clearCart() {
        if (confirm('Yakin ingin mengosongkan keranjang?')) {
            localStorage.removeItem('resto_cart');
            showToast('Keranjang berhasil dikosongkan ✓');
        }
    }
    let toastT;
    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        t.classList.remove('hidden');
        clearTimeout(toastT);
        toastT = setTimeout(() => t.classList.add('hidden'), 2500);
    }
</script>
</body>
</html>
